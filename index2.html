<!-- Form, Table, SEO, iFrame Concepts in HTML -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>

  <body>
    <!-- Form -->

    <form action=" ">
      <label> Name</label>
      <input type="text" placeholder="type your name" required />
      <br /><br />
      <label> DOB</label>
      <input type="date" />
      <br /><br />
      <label> email </label>
      <input type="email" placeholder="type your email id" required />
      <br /><br />
      <label for="password">Password</label>
      <input type="password" required />
      <br /><br />
      <label> Gender </label>
      <input type="radio" />Male <input type="radio" />Female <br /><br />
      <label for="country">Country</label>
      <select>
        <option>India</option>
        <option>Nz</option>
        <option>japan</option>
      </select>
      <br /><br />
      <button type="submit">Submit</button>
    </form>

    <br /><br /><br /><br />

    <!-- Table -->

    <table border="">
      <thead>
        <tr>
          <th>S.no</th>
          <th>Name</th>
          <th>email ID</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>1.</td>
          <td>Supraja</td>
          <td>suprajaSV@gmail.com</td>
        </tr>
        <tr>
          <td>2.</td>
          <td>krish</td>
          <td>krish@gmail.com</td>
        </tr>
      </tbody>
      <tfoot>
        <tr>
          <td>Total students</td>
          <td colspan="2">2</td>
        </tr>
      </tfoot>
    </table>

    <!-- SEO - Search Engine Optimization  -->

    <iframe

    <iframe
      width="560"
